syntax = "proto3";
package kv.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

// --- Token Ring ---

message Node {
  string id = 1;
  string addr = 2; // host:port
}

message KvEvent {
    enum Op {
      OP_UNSPECIFIED = 0;
        OP_PUT = 1;
        OP_DELETE = 2;
    }
    Op op = 1;
    string key = 2;
    google.protobuf.Value value = 3; // null for deletes
    uint64 seq = 4; //global sequence number
}

message Token {
    string holder_id = 1;
    uint64 log_offset = 2; // global seq of logs[0]
    uint64 min_applied = 3; // minimum applied seq number, 1-indexed. 0 means applied nothing.
    repeated KvEvent logs = 4;  // uncommitted log entries
    uint64 timestamp = 5; // lamport timestamp, updated by each node before passing
}

// --- KV CRUD ---

message GetRequest {
  string key = 1 [(buf.validate.field).string.min_len = 1];
}
message GetResponse {
  google.protobuf.Value value = 1;
  bool found = 2;
}

message PutRequest {
  string key = 1 [(buf.validate.field).string.min_len = 1];
  google.protobuf.Value value = 2;
}
message PutResponse {}

message DeleteRequest {
  string key = 1 [(buf.validate.field).string.min_len = 1];
}
message DeleteResponse {}

// --- Token Passing ---

message ReceiveTokenRequest {
  Token token = 1;
}
message ReceiveTokenResponse {}

// --- Ring Management ---

message JoinRequest {
  Node node = 1;
}
message JoinResponse {
  repeated Node ring = 1; // full ring so new node knows topology
  int64 coordinator_idx = 2;
}

message LeaveRequest {
  string node_id = 1;
}
message LeaveResponse {}

message ElectionRequest {
  string node_id = 1;
}
message ElectionResponse {
  string node_id = 1;
}

message ReceivePrepareProposalRoundRequest {
  uint64 round = 1;     // logical counter
  uint64 round_changes = 2;
  string node_id = 3;
}
message ReceivePrepareProposalRoundResponse {
  bool promised = 1;

  // Previously accepted proposal (if any)
  uint64 prev_accepted_round = 2;
  uint64 prev_accepted_round_changes = 3;
  string prev_accepted_node_id = 4;
}

message ReceiveProposalRoundChangeRequest {
  string node_id = 1;
  uint64 round = 2;
  KvEvent kv_event = 3;
}
message ReceiveProposalRoundChangeResponse {}

message PingRequest {
  string node_id = 1;
}
message PingResponse {}

message SetPeersRequest {
  repeated Node nodes = 1;
  int64 coordinator_idx = 2;
}
message SetPeersResponse {}

message SeenTokenRequest {}
message SeenTokenResponse {
  bool seen = 1;
}

// --- Services ---

service KvService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

service TokenService {
  // called by predecessor to hand off the token
  rpc ReceiveToken(ReceiveTokenRequest) returns (ReceiveTokenResponse);
  rpc SeenToken(SeenTokenRequest) returns (SeenTokenResponse);
}

service RingService {
  rpc Join(JoinRequest) returns (JoinResponse); // Called on a node by new node that wants to join the ring
  rpc Leave(LeaveRequest) returns (LeaveResponse); // Called on all nodes or 1 node by node that wants to leave the ring
  rpc ReceiveElectionRequest(ElectionRequest) returns (ElectionResponse);
  rpc ReceivePrepareProposalRound(ReceivePrepareProposalRoundRequest) returns (ReceivePrepareProposalRoundResponse);
  rpc ReceiveProposalRoundChange(ReceiveProposalRoundChangeRequest) returns (ReceiveProposalRoundChangeResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc SetPeers(SetPeersRequest) returns (SetPeersResponse);
}
